<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RSVP Reader</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #f0f0f0;
    --text-muted: #888;
    --accent: #e63946;
    --orp: #e63946;
    --reader-font: Georgia, serif;
    --font-size: 2.4rem;
    --progress-h: 4px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SCREENS ─────────────────────────────────────────── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
    transition: opacity .25s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── LOAD SCREEN ─────────────────────────────────────── */
  #load-screen h1 {
    font-size: 1.6rem;
    letter-spacing: .05em;
    color: var(--text);
    margin-bottom: 8px;
  }
  #load-screen p { font-size: .85rem; color: var(--text-muted); text-align: center; }

  .input-group {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-label {
    font-size: .75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 2px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-size: .9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-size: .85rem;
    padding: 10px 12px;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: .75; }
  .btn.secondary {
    background: var(--surface2);
    border: 1px solid #333;
    color: var(--text);
  }

  .divider {
    width: 100%;
    max-width: 380px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: .75rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #333;
  }

  .file-upload-area {
    width: 100%;
    max-width: 380px;
    display: flex;
    gap: 10px;
  }
  .file-upload-area label {
    flex: 1;
    background: var(--surface2);
    border: 1px dashed #444;
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    font-size: .85rem;
    color: var(--text-muted);
    transition: border-color .2s, color .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .file-upload-area label:active { border-color: var(--accent); color: var(--text); }
  .file-upload-area input[type="file"] { display: none; }

  #load-error {
    color: var(--accent);
    font-size: .8rem;
    text-align: center;
    min-height: 1.2em;
    max-width: 340px;
  }

  /* ── READER SCREEN ───────────────────────────────────── */
  #reader-screen {
    flex-direction: column;
    justify-content: stretch;
    padding: 0;
  }

  /* Progress bar */
  #progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--progress-h);
    background: #222;
    z-index: 30;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .15s linear;
  }

  /* Word display */
  #word-stage {
    position: fixed;
    inset: 0;
    bottom: var(--progress-h);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* ORP alignment container */
  #orp-frame {
    position: relative;
    width: min(100vw - 48px, 24ch);
    height: calc(var(--font-size) * 1.6);
  }

  /* Red vertical ORP guide line */
  #orp-line {
    position: absolute;
    left: 50%;
    top: -12px;
    bottom: -12px;
    width: 2px;
    background: color-mix(in srgb, var(--orp) 35%, transparent);
    border-radius: 1px;
    pointer-events: none;
    transform: translateX(-50%);
  }

  #word-display {
    font-size: var(--font-size);
    font-family: var(--reader-font);
    font-weight: 400;
    white-space: nowrap;
    line-height: 1.2;
    letter-spacing: .02em;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #word-display .pre  { color: var(--text); }
  #word-display .orp  { color: var(--orp); }
  #word-display .post { color: var(--text); }

  /* Pause overlay */
  #pause-icon {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(.8);
    font-size: 3rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 20;
  }
  #pause-icon.show {
    opacity: .6;
    transform: translate(-50%, -50%) scale(1);
  }

  /* WPM HUD */
  #wpm-hud {
    position: fixed;
    top: 50%;
    right: 60px;
    transform: translateY(-50%);
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
    z-index: 25;
    white-space: nowrap;
  }
  #wpm-hud.show { opacity: 1; }

  /* Speed touch zone */
  #speed-zone {
    position: fixed;
    top: 0;
    right: 0;
    width: 52px;
    bottom: var(--progress-h);
    z-index: 15;
    /* invisible but touchable */
    background: transparent;
    cursor: ns-resize;
    -webkit-tap-highlight-color: transparent;
  }

  /* Back / settings buttons */
  #top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    z-index: 20;
    pointer-events: none;
  }
  #top-bar button {
    pointer-events: auto;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-size: .85rem;
    padding: 7px 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .15s;
  }
  #top-bar button:active { opacity: .65; }

  /* ── SETTINGS DRAWER ─────────────────────────────────── */
  #settings-drawer {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  #settings-drawer.open {
    opacity: 1;
    pointer-events: auto;
  }
  #settings-panel {
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    padding: 24px 20px 36px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    transform: translateY(30px);
    transition: transform .25s;
  }
  #settings-drawer.open #settings-panel { transform: translateY(0); }

  .settings-title {
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    letter-spacing: .04em;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .settings-row label {
    font-size: .85rem;
    color: var(--text-muted);
    flex: 0 0 100px;
  }
  .settings-row span.val {
    font-size: .85rem;
    color: var(--text);
    flex: 0 0 44px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #333;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid #0d0d0d;
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid #0d0d0d;
  }

  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 36px; height: 36px;
    border: none;
    border-radius: 6px;
    padding: 2px;
    background: var(--surface2);
    cursor: pointer;
  }

  .close-drawer-btn {
    align-self: center;
    background: var(--surface2);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-size: .85rem;
    padding: 10px 30px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* loading spinner */
  #spinner {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
    color: var(--text);
    font-size: .9rem;
  }
  #spinner.hidden { display: none; }
  .spin-ring {
    width: 44px; height: 44px;
    border: 4px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* word-count info */
  #word-info {
    position: fixed;
    bottom: calc(var(--progress-h) + 6px);
    left: 0;
    right: 0;
    text-align: center;
    font-size: .65rem;
    color: #444;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- ── SPINNER ─────────────────────────────────────────── -->
<div id="spinner" class="hidden">
  <div class="spin-ring"></div>
  <span id="spinner-msg">Loading…</span>
</div>

<!-- ── LOAD SCREEN ─────────────────────────────────────── -->
<div id="load-screen" class="screen">
  <h1>📖 RSVP Reader</h1>
  <p>Upload a PDF to begin speed-reading</p>

  <div class="file-upload-area">
    <label for="pdf-file">
      📄 PDF
      <input type="file" id="pdf-file" accept=".pdf">
    </label>
  </div>

  <div id="load-error"></div>
</div>

<!-- ── READER SCREEN ──────────────────────────────────── -->
<div id="reader-screen" class="screen hidden">

  <div id="top-bar">
    <button id="back-btn">← Back</button>
    <button id="settings-btn">⚙ Settings</button>
  </div>

  <div id="word-stage">
    <div id="orp-frame">
      <div id="orp-line"></div>
      <div id="word-display"><span class="pre"></span><span class="orp"></span><span class="post"></span></div>
    </div>
  </div>

  <div id="pause-icon">⏸</div>
  <div id="wpm-hud"></div>

  <!-- right-side speed zone -->
  <div id="speed-zone"></div>

  <div id="word-info"></div>

  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
</div>

<!-- ── SETTINGS DRAWER ────────────────────────────────── -->
<div id="settings-drawer">
  <div id="settings-panel">
    <div class="settings-title">Settings</div>

    <div class="settings-row">
      <label>Font size</label>
      <input type="range" id="font-range" min="1.4" max="5" step="0.1" value="2.4">
      <span class="val" id="font-val">2.4rem</span>
    </div>

    <div class="settings-row">
      <label>Font type</label>
      <select id="font-family">
        <option value="Georgia, serif">Serif</option>
        <option value="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif">Book</option>
        <option value="'Avenir Next', 'Helvetica Neue', Arial, sans-serif">Sans</option>
        <option value="'SF Mono', Menlo, Consolas, monospace">Mono</option>
      </select>
    </div>

    <div class="settings-row">
      <label>WPM</label>
      <input type="range" id="wpm-range" min="200" max="1000" step="10" value="300">
      <span class="val" id="wpm-val">300</span>
    </div>

    <div class="settings-row">
      <label>ORP colour</label>
      <input type="color" id="orp-color" value="#e63946">
    </div>

    <button class="close-drawer-btn" id="close-drawer-btn">Done</button>
  </div>
</div>

<!-- ── CDN SCRIPTS ─────────────────────────────────────── -->
<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
const state = {
  words: [],
  idx: 0,
  wpm: 300,
  playing: false,
  timer: null,
  fontSize: 2.4,
  fontFamily: 'Georgia, serif',
  orpColor: '#e63946',
};

/* ════════════════════════════════════════════════════════════
   ELEMENT REFS
═══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const loadScreen    = $('load-screen');
const readerScreen  = $('reader-screen');
const pdfFile       = $('pdf-file');
const loadError     = $('load-error');
const spinner       = $('spinner');
const spinnerMsg    = $('spinner-msg');
const wordDisplay   = $('word-display');
const orpFrame      = $('orp-frame');
const orpLine       = $('orp-line');
const progressBar   = $('progress-bar');
const pauseIcon     = $('pause-icon');
const wpmHud        = $('wpm-hud');
const speedZone     = $('speed-zone');
const wordInfo      = $('word-info');
const backBtn       = $('back-btn');
const settingsBtn   = $('settings-btn');
const settingsDrawer= $('settings-drawer');
const closeDrwBtn   = $('close-drawer-btn');
const fontRange     = $('font-range');
const fontVal       = $('font-val');
const fontFamilySel = $('font-family');
const wpmRange      = $('wpm-range');
const wpmVal        = $('wpm-val');
const orpColorInput = $('orp-color');

/* ════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function showSpinner(msg = 'Loading…') {
  spinnerMsg.textContent = msg;
  spinner.classList.remove('hidden');
}
function hideSpinner() { spinner.classList.add('hidden'); }

function setError(msg) { loadError.textContent = msg; }
function clearError()  { loadError.textContent = ''; }

/**
 * Tokenise raw text into readable word entries while preserving paragraph boundaries
 * so longer pauses can be introduced at natural stopping points.
 */
function textToWords(text) {
  const blocks = text
    .replace(/\r/g, '')
    .split(/\n\s*\n+/)
    .map(block => block.trim())
    .filter(Boolean);

  const entries = [];

  blocks.forEach((block, blockIndex) => {
    const words = block.split(/\s+/).map(w => w.trim()).filter(Boolean);

    words.forEach((word, wordIndex) => {
      const pauseBoost = (wordIndex === words.length - 1 && blockIndex < blocks.length - 1) ? 0.65 : 0;
      entries.push({ text: word, pauseBoost });
    });
  });

  return entries;
}

function tokenText(entry) {
  return typeof entry === 'string' ? entry : (entry?.text || '');
}

function tokenPauseBoost(entry) {
  return typeof entry === 'string' ? 0 : (entry?.pauseBoost || 0);
}

/* Minimum word count required to start the reader */
const MIN_WORDS = 5;

/* Width (px) of the right-edge speed touch zone (must match CSS) */
const SPEED_ZONE_WIDTH = 52;

/**
 * Approximate Spritz ORP placement using the common word-length buckets,
 * while ignoring leading and trailing punctuation for the focal character.
 */
function orpIndex(word) {
  const chars = Array.from(word);
  const isWordChar = char => /[\p{L}\p{N}]/u.test(char);

  let firstWordChar = chars.findIndex(isWordChar);
  if (firstWordChar === -1) return 0;

  let lastWordChar = firstWordChar;
  for (let index = chars.length - 1; index >= firstWordChar; index--) {
    if (isWordChar(chars[index])) {
      lastWordChar = index;
      break;
    }
  }

  const coreLength = lastWordChar - firstWordChar + 1;
  let coreIndex = 0;

  if (coreLength <= 1) coreIndex = 0;
  else if (coreLength <= 5) coreIndex = 1;
  else if (coreLength <= 9) coreIndex = 2;
  else if (coreLength <= 13) coreIndex = 3;
  else coreIndex = 4;

  return Math.min(firstWordChar + coreIndex, lastWordChar);
}

function delayMultiplier(entry) {
  const word = tokenText(entry);
  const cleanWord = word.replace(/^[^\p{L}\p{N}]+|[^\p{L}\p{N}]+$/gu, '');
  let multiplier = 1;

  if (cleanWord.length >= 7) multiplier += 0.1;
  if (cleanWord.length >= 10) multiplier += 0.14;
  if (cleanWord.length >= 14) multiplier += 0.18;
  if (/[,:;)]$/.test(word)) multiplier += 0.22;
  if (/[.!?]$/.test(word)) multiplier += 0.55;
  if (/[-—/]/.test(cleanWord)) multiplier += 0.08;

  multiplier += tokenPauseBoost(entry);

  return multiplier;
}

/* ════════════════════════════════════════════════════════════
   DISPLAY
═══════════════════════════════════════════════════════════ */
let orpPixelOffset = 0; // px from left edge of word-display to ORP char

function updateOrpOffset() {
  const orpSpan = wordDisplay.querySelector('.orp');
  if (!orpSpan) {
    orpPixelOffset = 0;
    return;
  }

  const wordRect = wordDisplay.getBoundingClientRect();
  const orpRect = orpSpan.getBoundingClientRect();
  orpPixelOffset = (orpRect.left - wordRect.left) + (orpRect.width / 2);
}

function renderWord() {
  if (!state.words.length) return;
  const word = tokenText(state.words[state.idx]);
  const chars = Array.from(word);
  const i    = orpIndex(word);
  const pre  = chars.slice(0, i).join('');
  const orp  = chars[i] || '';
  const post = chars.slice(i + 1).join('');

  wordDisplay.innerHTML =
    `<span class="pre">${escHtml(pre)}</span>` +
    `<span class="orp">${escHtml(orp)}</span>` +
    `<span class="post">${escHtml(post)}</span>`;

  updateOrpOffset();
  wordDisplay.style.left = `calc(50% - ${orpPixelOffset}px)`;
  wordDisplay.style.transform = 'translateY(-50%)';

  // Progress
  const pct = state.words.length > 1
    ? (state.idx / (state.words.length - 1)) * 100
    : 100;
  progressBar.style.width = `${pct}%`;

  // word count info
  wordInfo.textContent = `${state.idx + 1} / ${state.words.length}`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════════════════════
   PLAYBACK ENGINE
═══════════════════════════════════════════════════════════ */
function msPerWord() { return 60000 / state.wpm; }

function tick() {
  if (!state.playing) return;
  renderWord();
  state.idx++;
  if (state.idx >= state.words.length) {
    state.idx = state.words.length - 1;
    pause();
    return;
  }
  state.timer = setTimeout(tick, msPerWord() * delayMultiplier(state.words[state.idx] || ''));
}

function play() {
  if (state.playing || !state.words.length) return;
  if (state.idx >= state.words.length) state.idx = 0;
  state.playing = true;
  pauseIcon.classList.remove('show');
  tick();
}

function pause() {
  state.playing = false;
  clearTimeout(state.timer);
  renderWord();
  pauseIcon.classList.add('show');
  setTimeout(() => pauseIcon.classList.remove('show'), 600);
}

function togglePlay() {
  state.playing ? pause() : play();
}

/* ════════════════════════════════════════════════════════════
   SHOW READER
═══════════════════════════════════════════════════════════ */
function startReader(words) {
  state.words = words;
  state.idx   = 0;
  state.playing = false;
  clearTimeout(state.timer);

  loadScreen.classList.add('hidden');
  readerScreen.classList.remove('hidden');

  // small delay so layout is painted before we measure text
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      renderWord();
      play();
    });
  });
}

/* ════════════════════════════════════════════════════════════
   PDF LOADING
═══════════════════════════════════════════════════════════ */
async function loadPdf(file) {
  showSpinner('Reading PDF…');
  clearError();
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      fullText += content.items.map(item => item.str).join(' ') + ' ';
    }
    const words = textToWords(fullText);
    if (words.length < MIN_WORDS) throw new Error('Could not extract text from this PDF.');
    hideSpinner();
    startReader(words);
  } catch (e) {
    hideSpinner();
    setError(`PDF error: ${e.message}`);
  }
}

/* ════════════════════════════════════════════════════════════
   SPEED ZONE – vertical swipe on right edge
═══════════════════════════════════════════════════════════ */
let speedTouchStartY = null;
let speedWpmStart    = null;
let wpmHudTimer      = null;

function showWpmHud() {
  wpmHud.textContent = `${state.wpm} WPM`;
  wpmHud.classList.add('show');
  clearTimeout(wpmHudTimer);
  wpmHudTimer = setTimeout(() => wpmHud.classList.remove('show'), 1200);
}

speedZone.addEventListener('touchstart', e => {
  speedTouchStartY = e.touches[0].clientY;
  speedWpmStart    = state.wpm;
  e.preventDefault();
}, { passive: false });

speedZone.addEventListener('touchmove', e => {
  if (speedTouchStartY === null) return;
  const dy    = speedTouchStartY - e.touches[0].clientY; // up = positive
  const range = 800; // WPM range (200–1000)
  const zoneH = speedZone.offsetHeight;
  const delta = Math.round((dy / zoneH) * range);
  state.wpm   = Math.min(1000, Math.max(200, speedWpmStart + delta));

  // Keep range slider in sync
  wpmRange.value = state.wpm;
  wpmVal.textContent = state.wpm;

  showWpmHud();
  e.preventDefault();
}, { passive: false });

speedZone.addEventListener('touchend', () => {
  speedTouchStartY = null;
  speedWpmStart    = null;
});

/* ════════════════════════════════════════════════════════════
   WORD STAGE – tap to play/pause
═══════════════════════════════════════════════════════════ */
$('word-stage').addEventListener('click', e => {
  // Ignore taps on the right-edge zone (which overlays it)
  if (e.clientX > window.innerWidth - SPEED_ZONE_WIDTH) return;
  togglePlay();
});

/* ════════════════════════════════════════════════════════════
   SETTINGS DRAWER
═══════════════════════════════════════════════════════════ */
settingsBtn.addEventListener('click', () => {
  pause();
  settingsDrawer.classList.add('open');
});
closeDrwBtn.addEventListener('click', () => settingsDrawer.classList.remove('open'));
settingsDrawer.addEventListener('click', e => {
  if (e.target === settingsDrawer) settingsDrawer.classList.remove('open');
});

fontRange.addEventListener('input', () => {
  state.fontSize = parseFloat(fontRange.value);
  fontVal.textContent = `${state.fontSize.toFixed(1)}rem`;
  document.documentElement.style.setProperty('--font-size', `${state.fontSize}rem`);
  renderWord();
});

fontFamilySel.addEventListener('change', () => {
  state.fontFamily = fontFamilySel.value;
  document.documentElement.style.setProperty('--reader-font', state.fontFamily);
  renderWord();
});

wpmRange.addEventListener('input', () => {
  state.wpm = parseInt(wpmRange.value, 10);
  wpmVal.textContent = state.wpm;
});

orpColorInput.addEventListener('input', () => {
  state.orpColor = orpColorInput.value;
  document.documentElement.style.setProperty('--orp', state.orpColor);
  renderWord();
});

/* ════════════════════════════════════════════════════════════
   BACK BUTTON
═══════════════════════════════════════════════════════════ */
backBtn.addEventListener('click', () => {
  pause();
  state.words = [];
  readerScreen.classList.add('hidden');
  loadScreen.classList.remove('hidden');
  clearError();
});

/* ════════════════════════════════════════════════════════════
   FILE INPUTS
═══════════════════════════════════════════════════════════ */
pdfFile.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadPdf(file);
});

/* ════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS (desktop convenience)
═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (readerScreen.classList.contains('hidden')) return;
  if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') { pause(); state.idx = Math.min(state.idx + 1, state.words.length - 1); renderWord(); }
  if (e.key === 'ArrowLeft')  { pause(); state.idx = Math.max(state.idx - 1, 0); renderWord(); }
  if (e.key === 'ArrowUp')    { state.wpm = Math.min(1000, state.wpm + 50); wpmRange.value = state.wpm; wpmVal.textContent = state.wpm; showWpmHud(); }
  if (e.key === 'ArrowDown')  { state.wpm = Math.max(200,  state.wpm - 50); wpmRange.value = state.wpm; wpmVal.textContent = state.wpm; showWpmHud(); }
});

/* ════════════════════════════════════════════════════════════
   RESIZE → re-render to keep ORP alignment accurate
═══════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  if (!readerScreen.classList.contains('hidden')) renderWord();
});

/* ════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
wpmRange.value  = state.wpm;
wpmVal.textContent = state.wpm;
fontRange.value = state.fontSize;
fontVal.textContent = `${state.fontSize.toFixed(1)}rem`;
fontFamilySel.value = state.fontFamily;
document.documentElement.style.setProperty('--reader-font', state.fontFamily);
</script>
</body>
</html>
