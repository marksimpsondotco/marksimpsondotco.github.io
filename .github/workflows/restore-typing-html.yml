name: Restore typing.html if missing

on:
  push:
    branches:
      - main
  schedule:
    # Run every 30 minutes to catch force-pushes that bypass push triggers
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check and restore typing.html
        run: |
          if [ ! -f docs/typing.html ]; then
            echo "docs/typing.html is missing – restoring from backup branch"
            git fetch origin backup/typing-html
            git checkout origin/backup/typing-html -- docs/typing.html
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/typing.html
            git commit -m "Restore docs/typing.html [automated]"
            git push origin main
          else
            echo "docs/typing.html is present – nothing to do"
          fi
